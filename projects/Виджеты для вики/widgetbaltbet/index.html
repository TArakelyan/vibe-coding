<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>БалтБет Widget</title>
    <link rel="stylesheet" href="https://dumpster.cdn.sports.ru/d/e1/1e6a1e13db28c4db595a0bd517ab6.css">
</head>
<body>
    <div class="baltbet-widget">
        <div class="baltbet-logo">
            <img src="https://dumpster.cdn.sports.ru/b/46/d287537b164af137fea2eceada5d6.png" alt="БалтБет" width="80" height="24">
        </div>
        
        <div class="reklama-badge">
            <span>Реклама 18+</span>
            <div class="dots" id="reklamaDots">⋮</div>
            <div class="advertiser-info" id="advertiserInfo">
                <div class="advertiser-info-text">ООО «САНТОРИН», Erid: 2SDnjezdGWC</div>
            </div>
        </div>
        
        <div class="content-text">
            <!-- Текст будет установлен динамически через JavaScript -->
        </div>
        
        <div class="action-button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8.5 5L15.5 12L8.5 19" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <script src="https://dumpster.cdn.sports.ru/1/4f/3ab95569c3c0e3f65c0f1076fd7fb.js"></script>
    <script src="https://dumpster.cdn.sports.ru/7/a8/7b6cd043441da1e8ec16c8603abde.js"></script>
</body>
</html>
