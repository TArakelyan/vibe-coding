<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Финансовые данные букмекеров</title>
    <link rel="stylesheet" href="https://dumpster.cdn.sports.ru/b/81/9fc10fef1e6cdd2656c964f38ba79.css" />
    <script>
        (function () {
            var isLocal = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            var styleHref = isLocal ? './styles.css' : 'https://dumpster.cdn.sports.ru/b/81/9fc10fef1e6cdd2656c964f38ba79.css';
            document.write('<link rel=\"stylesheet\" href=\"' + styleHref + '\" />');
        })();
    </script>
</head>
<body>
    <div class="app-container">
        <!-- Переключатель годов -->
        <div class="year-tabs">
            <button class="year-tab" data-year="2025">2025</button>
            <button class="year-tab" data-year="2024">2024</button>
            <button class="year-tab" data-year="2023">2023</button>
            <button class="year-tab" data-year="2022">2022</button>
            <button class="year-tab" data-year="2021">2021</button>
            <button class="year-tab" data-year="2020">2020</button>
        </div>

        <!-- Данные компаний -->
        <div class="companies-section" id="companiesSection">
            <div id="companiesData"></div>
        </div>
    </div>

    <script src="https://dumpster.cdn.sports.ru/d/b6/43eb4a9cf8ae26e3f4af3b5bd1749.js"></script>
    <script>
        (function () {
            var isLocal = location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1';
            var scripts = isLocal
                ? ['./theme-detector.js', './script.js', './resize.js']
                : [
                    'https://dumpster.cdn.sports.ru/1/ac/1b4b4752ab826b2c5a855674f985f.js',  // theme-detector
                    'https://dumpster.cdn.sports.ru/a/96/590faaa8a94f4868785fc3222125c.js',  // script (данные)
                    'https://dumpster.cdn.sports.ru/1/6c/b498d560aa0cf87e5c2fac2f0a8f2.js'   // resize
                ];

            for (var i = 0; i < scripts.length; i++) {
                document.write('<script src="' + scripts[i] + '"><\/script>');
            }
        })();
    </script>
</body>
</html>
