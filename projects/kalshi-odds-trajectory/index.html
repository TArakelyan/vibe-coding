<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalshi-подобный график коэффициентов</title>
    <meta name="description" content="Анимированный график коэффициентов с логотипами команд по датам." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="kalshi-app">
      <div class="chart-field" id="chartField">
        <svg
          class="chart-svg"
          id="chartSvg"
          viewBox="0 0 900 420"
          preserveAspectRatio="none"
          aria-label="График коэффициентов"
          role="img"
        ></svg>
      </div>
    </div>

    <script src="./data/odds-data.js"></script>
    <script src="./main-trajectory.js"></script>
    <script src="./resize.js"></script>
  </body>
</html>
