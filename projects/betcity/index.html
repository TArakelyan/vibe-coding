<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betcity Widget - Выход в 1/4 финала</title>
    <link rel="stylesheet" href="https://dumpster.cdn.sports.ru/0/41/ee60a94a537fc7b6a0b57439ac296.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import "https://senoval.cdn.sports.ru/static-resources/fonts/roboto.css";

    </style>
    <style>
        @font-face {
            font-family: 'TT Neoris';
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: local('TT Neoris'), local('TTNeoris');
        }
        @font-face {
            font-family: 'TT Neoris';
            font-weight: 500;
            font-style: normal;
            font-display: swap;
            src: local('TT Neoris Medium'), local('TTNeoris-Medium');
        }
        
        /* КРИТИЧЕСКИ ВАЖНО - ограничиваем высоту html и body */
        html, body {
            height: auto !important;
            max-height: none !important;
            min-height: 0 !important;
            overflow: visible !important;
        }
    </style>
</head>
<body>
    <div class="bundes-predictor-container">
        <div class="conference-section">
