<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundes Predictor</title>
    <link rel="stylesheet" href="https://dumpster.cdn.sports.ru/b/ac/cd67dd5c860c8c7ff82966041f77d.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        @import "https://senoval.cdn.sports.ru/static-resources/fonts/roboto.css";
        @import "https://senoval.cdn.sports.ru/static-resources/fonts/sports.css";
    </style>
    <style>
        @font-face {
            font-family: 'TT Neoris';
            font-weight: 400;
            font-style: normal;
            font-display: swap;
            src: local('TT Neoris'), local('TTNeoris');
        }
        @font-face {
            font-family: 'TT Neoris';
            font-weight: 500;
            font-style: normal;
            font-display: swap;
            src: local('TT Neoris Medium'), local('TTNeoris-Medium');
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bundes-predictor-container">
            <div class="conference-section">
                <h1 class="conference-title">«Монако» – «ПСЖ»</h1>
                <div id="contenders-list" class="teams-list contenders"></div>
                <div class="conference-spacer"></div>
            </div>
        </div>
    </div>

    <script src="https://dumpster.cdn.sports.ru/d/d0/e660a8f63b2e74ea595402a38ca36.js"></script>
    <script src="https://dumpster.cdn.sports.ru/7/3f/1c95ab025d0e0956bb8490fe05d53.js"></script>
    <script src="https://dumpster.cdn.sports.ru/d/58/fd08abaca780def156fc3514b6d82.js"></script>
    <script src="https://dumpster.cdn.sports.ru/2/21/4cc8e25281685ed783b2ac70b23b8.js"></script>
    <script>
let lastHeight = null;

const resize = ({force = false}) => {
    const container = document.querySelector('.container');
    const currentHeight = container ? container.offsetHeight : 200;
    
    if (lastHeight !== null && !force && Math.abs(currentHeight - lastHeight) < 2) {
      return;
    }
    
    lastHeight = currentHeight;
    
    const dataUTILS = {
      for: 'BASIC_TEST',
      action: 'resizeIframe',
      selector: `iframe[src*="dumpster.cdn.sports.ru"]`,
      sizes: {
        height: currentHeight,
      },
    };

    window?.top?.postMessage(JSON.stringify(dataUTILS), '*');
  }

const resizeObserver = new ResizeObserver(() => {
  resize({});
});
resizeObserver.observe(document.body);
resize({force: true});

setTimeout(() => { resize({force: true}); }, 1000);
setTimeout(() => { resize({force: true}); }, 2000);
setTimeout(() => { resize({force: true}); }, 3000);
setTimeout(() => { resize({force: true}); }, 5000);
setTimeout(() => { resize({force: true}); }, 7000);
    </script>
</body>
</html>
