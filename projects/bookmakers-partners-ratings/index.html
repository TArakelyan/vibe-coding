<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Рейтинг партнерств букмекеров</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="page" id="app">
    <section class="filters" aria-label="Фильтры">
      <div class="filters-search">
        <span class="filters-search-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        </span>
        <input type="search" id="searchInput" class="filters-search-input" placeholder="Поиск по партнеру, виду спорта или букмекеру" autocomplete="off" />
      </div>

      <div class="filters-row filters-row--three">
        <label class="filter-field">
          <span class="filter-label">Букмекер</span>
          <select id="filterBookmaker" class="filter-select"></select>
        </label>
        <label class="filter-field">
          <span class="filter-label">Вид спорта</span>
          <select id="filterSport" class="filter-select"></select>
        </label>
        <label class="filter-field">
          <span class="filter-label">Организация</span>
          <select id="filterEntity" class="filter-select"></select>
        </label>
      </div>

      <div class="filters-meta">
        <button type="button" class="link-reset" id="resetFilters">
          <span class="link-reset-x" aria-hidden="true">×</span>
          Сбросить фильтры
        </button>
        <span class="filters-count" id="resultCount"></span>
      </div>
    </section>

    <div class="table-wrap" role="region" aria-label="Таблица партнерств">
      <div class="data-grid data-grid--head" role="row">
        <button type="button" class="th th--sort" data-sort="bookmaker" id="sortBookmaker" title="Букмекер">
          <span class="th-text">Букмекер</span><span class="sort-ind" aria-hidden="true"></span>
        </button>
        <button type="button" class="th th--sort" data-sort="partner" id="sortPartner">
          <span class="th-text">Партнер</span><span class="sort-ind" aria-hidden="true"></span>
        </button>
        <button type="button" class="th th--sort" data-sort="sport" id="sortSport">
          <span class="th-text">Вид спорта</span><span class="sort-ind" aria-hidden="true"></span>
        </button>
        <button type="button" class="th th--sort" data-sort="year" id="sortYear">
          <span class="th-text">Год</span><span class="sort-ind" aria-hidden="true"></span>
        </button>
      </div>
      <div id="rowsContainer" class="rows"></div>
    </div>
  </div>

  <script src="./data/bookmakers.js"></script>
  <script src="./data/partners.js"></script>
  <script src="./main.js"></script>
  <script src="./resize.js"></script>
</body>
</html>
