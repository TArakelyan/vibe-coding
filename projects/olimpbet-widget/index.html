<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ОлимпБет Widget</title>
    <link rel="stylesheet" href="https://dumpster.cdn.sports.ru/7/8e/d82c4fb64b5c00ac3733fe61fa605.css">
    <style>
        /* Исправление высоты для корректного отображения в iframe */
        html, body {
            height: auto !important;
            min-height: auto !important;
            overflow: visible !important;
        }
        body {
            width: 100% !important;
            max-width: 672px;
            margin: 0;
            padding: 0;
        }
        @media (max-width: 500px) {
            body {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="olimpbet-widget">
        <div class="olimpbet-logo">
            <img src="https://dumpster.cdn.sports.ru/3/f5/283734791d928a5d5e74dc539cbe9.png" alt="ОлимпБет">
        </div>
        <div class="reklama-badge">
            Реклама 18+
            <span class="dots" id="reklamaDots">⋮</span>
            <div class="advertiser-info" id="advertiserInfo">
                <div class="advertiser-info-text">ООО «БК «Олимп», Erid: 2SDnjcaFz9N</div>
            </div>
        </div>
        <div class="content-text">
            🎁 Бонус: фрибет 8000₽ для новичков
        </div>
        <div class="action-button">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 3L11 8L6 13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
    </div>

    <script src="https://dumpster.cdn.sports.ru/5/b6/6d6d005e216ef4037a528d8fc6421.js"></script>
    <script src="https://dumpster.cdn.sports.ru/1/2c/1deab618c6fdfb625551910ea5a50.js"></script>
</body>
</html>
